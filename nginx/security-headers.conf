# =============================================================================
# Security Headers — Nilmani Ceylon Tours
# =============================================================================
# Included by each site server block via: include /etc/nginx/conf.d/security-headers.conf;
#
# These headers protect against common web vulnerabilities: XSS, clickjacking,
# MIME sniffing, and unwanted feature access.
# =============================================================================

# -----------------------------------------------------------------
# Content Security Policy (CSP)
# -----------------------------------------------------------------
# Breakdown of each directive:
#   default-src 'self'            — Only allow resources from our own origin
#   script-src  'self' 'unsafe-inline' — Next.js injects inline <script> tags
#                                        for hydration data and JSON-LD schemas
#   style-src   'self' 'unsafe-inline' — Tailwind CSS and Next.js inject inline
#                                        styles; removing this breaks styling
#   img-src     'self' https://res.cloudinary.com https://images.unsplash.com data:
#                                      — Allow Cloudinary CDN images, Unsplash
#                                        placeholders, and inline data: URIs
#   font-src    'self'            — Self-hosted fonts only (next/font)
#   connect-src 'self' https://plausible.io https://www.google-analytics.com
#                                 — Analytics beacon endpoints (Plausible cloud
#                                   + GA4). Remove whichever you don't use.
#   frame-ancestors 'none'        — Prevent embedding in iframes (clickjacking)
#   base-uri    'self'            — Prevent <base> tag hijacking
#   form-action 'self'            — Forms can only submit to our own origin
#
# TODO: If you add new external services (maps, payment, chat widgets),
#       update the relevant directive here.
# -----------------------------------------------------------------
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://res.cloudinary.com https://images.unsplash.com data:; font-src 'self'; connect-src 'self' https://plausible.io https://www.google-analytics.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# -----------------------------------------------------------------
# HSTS — Tell browsers to only connect over HTTPS for the next 2 years.
# The preload directive allows submission to the HSTS preload list.
# WARNING: Only enable preload once you're confident HTTPS works everywhere.
# -----------------------------------------------------------------
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -----------------------------------------------------------------
# Prevent MIME-type sniffing — browsers must respect the declared
# Content-Type, preventing attacks that disguise scripts as images.
# -----------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;

# -----------------------------------------------------------------
# Clickjacking protection — redundant with CSP frame-ancestors but
# still needed for older browsers that don't support CSP.
# -----------------------------------------------------------------
add_header X-Frame-Options "DENY" always;

# -----------------------------------------------------------------
# Referrer Policy — Send the origin (scheme + host) on cross-origin
# requests but full URL on same-origin. Balances analytics needs
# with user privacy.
# -----------------------------------------------------------------
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# -----------------------------------------------------------------
# Permissions Policy — Explicitly deny access to sensitive browser
# features that a tourism website does not need.
# TODO: If you add a map feature, you may need geolocation=self
# -----------------------------------------------------------------
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
