# =============================================================================
# Rate Limiting Zones — Nilmani Ceylon Tours
# =============================================================================
# Included by the main nginx.conf in the http{} block.
# These zones are referenced in the site server block to throttle abuse.
#
# How it works:
#   limit_req_zone defines a shared memory zone that tracks request rates
#   per key (here, the client IP after Cloudflare real-IP restoration).
#   The zone is then applied with limit_req in location blocks.
# =============================================================================

# -----------------------------------------------------------------
# Zone: api — General API route protection
# -----------------------------------------------------------------
# 10 requests/second per IP. The 10m zone size holds ~160,000 IP states.
# This covers /api/* routes (booking submissions, contact forms, etc.)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# -----------------------------------------------------------------
# Zone: auth — Authentication route protection (stricter)
# -----------------------------------------------------------------
# 5 requests/minute per IP. Prevents brute-force login/password-reset
# attacks. Applied to /api/auth/* routes.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# -----------------------------------------------------------------
# Zone: general — Catch-all for page requests (generous)
# -----------------------------------------------------------------
# 30 requests/second per IP. Protects against aggressive scrapers
# while allowing normal browsing (page loads with many assets).
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

# -----------------------------------------------------------------
# Default rate-limit response settings
# -----------------------------------------------------------------
# Return 429 Too Many Requests (instead of the default 503)
limit_req_status 429;

# Log rate-limited requests at warn level so you can monitor abuse
# without flooding the error log
limit_req_log_level warn;
