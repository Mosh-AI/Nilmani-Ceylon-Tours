# =============================================================================
# Main Nginx Configuration — Nilmani Ceylon Tours
# =============================================================================
# This is the top-level nginx.conf. It sets global worker, connection, and
# compression settings, then pulls in modular includes for rate-limiting,
# security headers, and site-specific server blocks.
# =============================================================================

# Automatically detect available CPU cores
worker_processes auto;

# Maximum number of open file descriptors per worker (raise if you see
# "too many open files" in the error log)
worker_rlimit_nofile 8192;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker. 1024 is fine for a single-site
    # VPS; raise to 2048+ if you expect heavy concurrent traffic.
    worker_connections 1024;

    # Use epoll on Linux for efficient event handling
    use epoll;

    # Accept as many connections as possible at once
    multi_accept on;
}

http {
    # -----------------------------------------------------------------
    # Basic MIME types and defaults
    # -----------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -----------------------------------------------------------------
    # Hide Nginx version in error pages and Server header
    # -----------------------------------------------------------------
    server_tokens off;

    # -----------------------------------------------------------------
    # Logging format — includes request time and upstream response time
    # for performance monitoring
    # -----------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # -----------------------------------------------------------------
    # Performance tuning
    # -----------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    keepalive_timeout  65;
    keepalive_requests 100;

    # Buffer sizes — tuned for typical HTML/JSON responses
    client_body_buffer_size   16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # -----------------------------------------------------------------
    # Gzip compression — compresses text-based responses to reduce
    # bandwidth. Images and videos are already compressed so we skip them.
    # -----------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.ms-fontobject
        font/opentype
        font/ttf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # -----------------------------------------------------------------
    # Cloudflare Real IP Restoration
    # -----------------------------------------------------------------
    # When sitting behind Cloudflare, $remote_addr is a Cloudflare edge IP.
    # These directives tell Nginx to trust Cloudflare's IP ranges and read
    # the real visitor IP from CF-Connecting-IP.
    #
    # TODO: Keep these ranges up-to-date. Check:
    # https://www.cloudflare.com/ips-v4 and https://www.cloudflare.com/ips-v6
    # -----------------------------------------------------------------
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # -----------------------------------------------------------------
    # WebSocket connection upgrade map
    # -----------------------------------------------------------------
    # Maps the Upgrade header to the correct Connection value.
    # If the client sends Upgrade: websocket, Connection becomes "upgrade".
    # Otherwise it stays empty (for HTTP keepalive).
    # This MUST live in the http{} block, not inside a server{} block.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # -----------------------------------------------------------------
    # Modular includes
    # -----------------------------------------------------------------
    include /etc/nginx/conf.d/rate-limiting.conf;
    include /etc/nginx/conf.d/sites/*.conf;
}
