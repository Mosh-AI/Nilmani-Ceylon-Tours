# =============================================================================
# Site Server Block — nilmaniceylontours.com
# =============================================================================
# Reverse proxy to the Next.js 16 standalone app running on port 3000 inside
# Docker, with SSL terminated by Nginx using a Cloudflare Origin Certificate.
# =============================================================================

# -----------------------------------------------------------------
# Upstream — Docker service name for the Next.js app
# -----------------------------------------------------------------
upstream nextjs_app {
    server app:3000;

    # Keep persistent connections to the upstream to reduce TCP overhead
    keepalive 32;
}

# -----------------------------------------------------------------
# HTTP -> HTTPS redirect
# -----------------------------------------------------------------
# All plain HTTP traffic is permanently redirected to HTTPS.
# Cloudflare should enforce this too, but this is a safety net.
server {
    listen 80;
    listen [::]:80;

    server_name nilmaniceylontours.com www.nilmaniceylontours.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------------
# HTTPS server block
# -----------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name nilmaniceylontours.com www.nilmaniceylontours.com;

    # -----------------------------------------------------------------
    # SSL Configuration — Cloudflare Origin Certificate
    # -----------------------------------------------------------------
    # TODO: Place your Cloudflare Origin Certificate files at these paths
    # on the host, then mount them into the Nginx container (see docker-compose.yml).
    #
    # Generate an Origin Certificate in the Cloudflare dashboard:
    # SSL/TLS -> Origin Server -> Create Certificate
    # -----------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/origin-cert.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    # Modern TLS settings — TLS 1.2+ only (Cloudflare handles older clients)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # SSL session caching for performance
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # -----------------------------------------------------------------
    # Security headers (loaded from separate file for modularity)
    # -----------------------------------------------------------------
    include /etc/nginx/conf.d/security-headers.conf;

    # -----------------------------------------------------------------
    # Client body size limit — allows image uploads up to 5MB
    # -----------------------------------------------------------------
    client_max_body_size 5M;

    # -----------------------------------------------------------------
    # General rate limiting — applied to all requests as a baseline
    # -----------------------------------------------------------------
    limit_req zone=general burst=50 nodelay;

    # -----------------------------------------------------------------
    # Next.js static assets — /_next/static/
    # -----------------------------------------------------------------
    # These files have content hashes in their filenames, so they are
    # immutable and safe to cache aggressively.
    location /_next/static/ {
        proxy_pass http://nextjs_app;

        # Cache for 1 year — content-hash filenames make this safe
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Do not add security headers here; they come from the proxy response
        # and the include above applies to the server block scope
    }

    # -----------------------------------------------------------------
    # Public static files — /images/, /fonts/, /seo/
    # -----------------------------------------------------------------
    # TODO: If you serve these directly from Nginx (not via Next.js),
    # point the root to the host directory where public/ is mounted.
    # For now, we proxy to Next.js which serves its own public/ folder.
    location ~* ^/(images|fonts|seo|uploads)/ {
        proxy_pass http://nextjs_app;

        # Cache for 30 days — update filenames or bust cache manually
        # when you replace images
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # -----------------------------------------------------------------
    # Favicon and common root-level static files
    # -----------------------------------------------------------------
    location ~* ^/(favicon\.ico|robots\.txt|sitemap\.xml|site\.webmanifest)$ {
        proxy_pass http://nextjs_app;

        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # -----------------------------------------------------------------
    # API routes — rate-limited more aggressively
    # -----------------------------------------------------------------
    location /api/ {
        # Apply API rate limit: 10 req/s with burst of 20
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://nextjs_app;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't buffer API responses — stream them
        proxy_buffering off;
    }

    # -----------------------------------------------------------------
    # Auth routes — strictest rate limiting
    # -----------------------------------------------------------------
    location /api/auth/ {
        # Apply auth rate limit: 5 req/min with burst of 10 (delayed)
        # The delay means excess requests within the burst are queued,
        # not immediately rejected — smoother UX for legitimate users.
        limit_req zone=auth burst=10 delay=5;

        proxy_pass http://nextjs_app;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------
    # Default location — proxy everything else to Next.js
    # -----------------------------------------------------------------
    location / {
        proxy_pass http://nextjs_app;

        # Pass the real host and IP to Next.js
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — needed for Next.js HMR in development
        # and any future real-time features
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts — generous enough for SSR pages that make API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # -----------------------------------------------------------------
    # Custom error pages (optional)
    # -----------------------------------------------------------------
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
