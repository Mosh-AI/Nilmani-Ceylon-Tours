name: Restart App

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Check and fix Nginx + PM2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            echo "=== PM2 Status ==="
            pm2 status

            echo "=== Nginx sites-enabled ==="
            ls /etc/nginx/sites-enabled/

            echo "=== Nilmani Nginx config ==="
            cat /etc/nginx/sites-enabled/nilmani* 2>/dev/null || cat /etc/nginx/sites-enabled/default 2>/dev/null | head -60

            echo "=== Port check ==="
            ss -tlnp | grep 3002

            echo "=== Nginx error log (last 20) ==="
            tail -20 /var/log/nginx/error.log

            echo "=== Nginx test ==="
            nginx -t

            echo "=== Reload Nginx ==="
            systemctl reload nginx
