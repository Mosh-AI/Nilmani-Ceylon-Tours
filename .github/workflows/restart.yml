name: Restart App

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Fix Nginx + restart PM2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            echo "=== Fix Nginx config: use 127.0.0.1 instead of localhost ==="
            sed -i 's|proxy_pass http://localhost:3002|proxy_pass http://127.0.0.1:3002|g' /etc/nginx/sites-enabled/nilmani
            grep "proxy_pass" /etc/nginx/sites-enabled/nilmani

            echo "=== Nginx test ==="
            nginx -t

            echo "=== Reload Nginx ==="
            systemctl reload nginx

            echo "=== Restart PM2 nilmani ==="
            pm2 restart nilmani

            echo "=== PM2 Status ==="
            pm2 status

            echo "=== Port check ==="
            ss -tlnp | grep 3002 || echo "(port 3002 not yet bound — app still starting)"

            echo "✅ Done"
