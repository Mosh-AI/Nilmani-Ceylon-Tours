name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          command_timeout: 25m
          script: |
            set -e

            cd /var/www/nilmani

            # Hard-reset to remote master — discards local modifications and
            # removes untracked files (except gitignored: .env.local, .next/, node_modules/)
            git fetch origin master
            git reset --hard origin/master
            git clean -fd

            # Install all dependencies (build requires tailwind, typescript, etc.)
            npm install

            # Run Drizzle migrations
            npx drizzle-kit migrate

            # Write Maps API key to .env.local (gitignored, persists on VPS)
            grep -qxF 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}' .env.local 2>/dev/null \
              || echo 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}' >> .env.local

            # Export for the current build process
            export NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="${{ secrets.GOOGLE_MAPS_API_KEY }}"

            # Stop PM2 before build to prevent restarts on incomplete .next
            pm2 stop nilmani || true

            # Remove entire stale .next dir — prevents "client reference manifest" crashes
            rm -rf .next

            # Build Next.js (output: standalone) — use npx to avoid Turbopack fallback
            npx next build

            # Copy static assets into standalone bundle
            cp -r .next/static .next/standalone/.next/static
            cp -r public/. .next/standalone/public/

            # Restart with correct standalone config
            pm2 start ecosystem.config.js --only nilmani || pm2 restart nilmani

            # Save PM2 process list
            pm2 save

            # Reload Nginx
            nginx -t && systemctl reload nginx

            echo "✅ Deployment complete"
