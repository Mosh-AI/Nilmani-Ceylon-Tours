name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          script: |
            set -e

            cd /var/www/nilmani

            # Pull latest code
            git pull origin master

            # Install all dependencies (build requires tailwind, typescript, etc.)
            npm install

            # Run Drizzle migrations
            npx drizzle-kit migrate

            # Stop PM2 before build to prevent restarts on incomplete .next
            pm2 stop nilmani || true

            # Build Next.js (output: standalone)
            node node_modules/next/dist/bin/next build

            # Copy static assets into standalone bundle
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public

            # Restart with correct standalone config
            pm2 start ecosystem.config.js --only nilmani || pm2 restart nilmani

            # Save PM2 process list
            pm2 save

            # Reload Nginx
            nginx -t && systemctl reload nginx

            echo "✅ Deployment complete"
