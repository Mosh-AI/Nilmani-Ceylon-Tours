services:
  # ===========================================================================
  # Next.js Production App (standalone build)
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: nilmani-ceylon-tours:latest
    container_name: nilmani-app
    restart: unless-stopped
    # No "ports" mapping — Nginx handles external traffic.
    # The app is only reachable via the internal Docker network.
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal

  # ===========================================================================
  # Nginx Reverse Proxy — SSL termination, caching, rate limiting
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: nilmani-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Main config replaces the default nginx.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Modular config files
      - ./nginx/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
      - ./nginx/rate-limiting.conf:/etc/nginx/conf.d/rate-limiting.conf:ro
      - ./nginx/sites/nilmani.conf:/etc/nginx/conf.d/sites/nilmani.conf:ro
      # SSL certificates — Cloudflare Origin Certificate
      # TODO: Place your origin-cert.pem and origin-key.pem in ./nginx/ssl/
      #       Generate them in Cloudflare Dashboard -> SSL/TLS -> Origin Server
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Persist logs on the host for debugging and monitoring
      - nginx-logs:/var/log/nginx
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - internal

  # ===========================================================================
  # Development Server (not used in production)
  # ===========================================================================
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: nilmani-ceylon-tours:dev
    container_name: nilmani-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles:
      - dev

networks:
  internal:
    driver: bridge

volumes:
  nginx-logs:
